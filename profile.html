<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Profile - RealGorilla</title>

<link rel="icon" type="image/svg+xml" href="/favicon.svg">

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Roboto', 'Segoe UI', system-ui, sans-serif;
            background: #0f0f0f;
            color: white;
            min-height: 100vh;
        }
        #login-bar {
            background: #0f0f0f; padding: 4px 24px;
            display: flex; justify-content: flex-end; align-items: center;
            gap: 12px; font-size: 13px; border-bottom: 1px solid #272727;
        }
        #login-bar span { color: #aaa; cursor: pointer; }
        #login-bar span:hover { color: #fff; }
        #login-bar button { border: none; padding: 6px 15px; border-radius: 18px; cursor: pointer; font-weight: 500; font-size: 13px; }
        .btn-blue { background: #3ea6ff; color: #0f0f0f; }
        .btn-blue:hover { background: #65b8ff; }
        .btn-dark { background: #272727; color: #fff; }
        .btn-dark:hover { background: #3f3f3f; }
        .banner { background: linear-gradient(135deg, #1a3a4a 0%, #0f0f0f 100%); height: 150px; }
        .profile-header {
            padding: 0 24px; display: flex; align-items: center;
            gap: 20px; margin-top: -50px; margin-bottom: 30px;
            position: relative; z-index: 1;
        }
        .avatar-large {
            width: 100px; height: 100px; border-radius: 50%;
            background: #272727; border: 4px solid #0f0f0f;
            display: flex; align-items: center; justify-content: center;
            font-size: 3em; flex-shrink: 0;
        }
        .profile-info { flex-grow: 1; padding-bottom: 8px; }
        .profile-info h1 { font-size: 1.8em; margin-bottom: 2px; }
        .profile-info .handle { color: #aaa; font-size: 13px; margin-bottom: 4px; }
        .profile-info .stats { display: flex; gap: 20px; color: #aaa; font-size: 13px; margin-top: 8px; }
        .profile-info .stats span { display: flex; align-items: center; gap: 4px; }
        .edit-btn {
            background: #272727; color: #fff; border: none;
            padding: 8px 20px; border-radius: 18px; cursor: pointer;
            font-weight: 500; font-size: 13px; margin-top: 8px;
        }
        .edit-btn:hover { background: #3f3f3f; }
        .tabs {
            display: flex; gap: 0; border-bottom: 1px solid #272727;
            padding: 0 24px; margin-bottom: 24px;
        }
        .tab {
            padding: 10px 20px; color: #aaa; cursor: pointer;
            font-size: 13px; font-weight: 500; border: none;
            background: none; border-bottom: 3px solid transparent;
        }
        .tab:hover { color: #fff; }
        .tab.active { color: #fff; border-bottom-color: #3ea6ff; }
        .content-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 18px; padding: 0 24px 40px;
        }
        .ext-card {
            background: #1a1a1a; border-radius: 12px; overflow: hidden;
            cursor: pointer; transition: transform 0.2s;
        }
        .ext-card:hover { transform: scale(1.02); }
        .ext-card .thumbnail {
            width: 100%; height: 150px; background: #272727;
            display: flex; align-items: center; justify-content: center;
            font-size: 3em;
        }
        .ext-card .card-body { padding: 12px; display: flex; gap: 10px; }
        .ext-card .card-icon {
            width: 36px; height: 36px; border-radius: 50%;
            background: #272727; display: flex; align-items: center;
            justify-content: center; font-size: 1.3em; flex-shrink: 0;
        }
        .ext-card .card-info h3 {
            font-size: 13px; font-weight: 500; margin-bottom: 3px;
            color: #fff; display: -webkit-box; -webkit-line-clamp: 1;
            -webkit-box-orient: vertical; overflow: hidden;
        }
        .ext-card .card-info .meta { font-size: 11px; color: #aaa; }
        .modal-overlay {
            display: none; position: fixed; inset: 0;
            background: rgba(0,0,0,0.8); z-index: 999;
            justify-content: center; align-items: center;
        }
        .modal-overlay.show { display: flex; }
        .modal {
            background: #1a1a1a; border-radius: 12px; padding: 30px;
            max-width: 450px; width: 90%; color: white;
        }
        .modal h2 { color: #3ea6ff; margin-bottom: 20px; }
        .modal .form-group { margin-bottom: 16px; }
        .modal label { display: block; color: #aaa; margin-bottom: 4px; font-size: 13px; }
        .modal input {
            width: 100%; padding: 10px; border-radius: 8px;
            border: 1px solid #333; background: #0f0f0f; color: white; font-size: 14px;
        }
        .modal input:focus { border-color: #3ea6ff; outline: none; }
        .modal .save-btn {
            background: #3ea6ff; color: #0f0f0f; border: none;
            padding: 10px 24px; border-radius: 18px; cursor: pointer;
            font-weight: 500; width: 100%; margin-top: 8px;
        }
        .modal .cancel-btn {
            background: #272727; color: #fff; border: none;
            padding: 10px 24px; border-radius: 18px; cursor: pointer;
            font-weight: 500; width: 100%; margin-top: 8px;
        }
        .no-content { text-align: center; padding: 60px 24px; color: #aaa; }
        .no-content a { color: #3ea6ff; }
        .loading { text-align: center; padding: 60px; color: #aaa; }
        footer { text-align: center; padding: 20px; color: #555; font-size: 12px; }
    </style>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
</head>
<body>
    <div id="login-bar">
        <span id="user-info">Not logged in</span>
        <button id="login-btn" onclick="window.location.href='login.html'" class="btn-blue">🔐 Login</button>
        <button id="logout-btn" onclick="logout()" class="btn-dark" style="display:none;">Logout</button>
    </div>
    <div id="login-warning" style="text-align:center;padding:60px;color:#aaa;font-size:16px;">
        ⚠️ Please <a href="login.html" style="color:#3ea6ff;">log in</a> to view your profile.
    </div>
    <div id="profile-content" style="display:none;">
        <div class="banner"></div>
        <div class="profile-header">
            <div class="avatar-large" id="avatar-display">🦍</div>
            <div class="profile-info">
                <h1 id="display-username">@username</h1>
                <div class="handle" id="display-email">email</div>
                <div class="stats">
                    <span>🧩 <b id="ext-count">0</b> extensions</span>
                    <span>📥 <b id="total-downloads">0</b> downloads</span>
                </div>
                <button class="edit-btn" id="edit-btn" onclick="openEditModal()">✏️ Edit Profile</button>
            </div>
        </div>
        <div class="tabs">
            <button class="tab active" onclick="showTab('extensions', this)">🧩 Extensions</button>
            <button class="tab" onclick="showTab('about', this)">ℹ️ About</button>
        </div>
        <div id="extensions-tab">
            <div id="extensions-grid" class="content-grid loading">Loading extensions...</div>
            <div id="no-extensions" class="no-content" style="display:none;">
                📭 No extensions yet.<br><a href="submit.html">Create your first extension!</a>
            </div>
        </div>
        <div id="about-tab" style="display:none;padding:0 24px 40px;">
            <div style="max-width:600px;">
                <p id="display-bio" style="color:#aaa;line-height:1.6;margin-bottom:20px;">No bio yet.</p>
                <a href="extensions.html" style="color:#3ea6ff;">← Back to Store</a>
            </div>
        </div>
    </div>
    <div class="modal-overlay" id="edit-modal">
        <div class="modal">
            <h2>✏️ Edit Profile</h2>
            <div class="form-group"><label>🦍 Username</label><input type="text" id="edit-username" placeholder="@username" maxlength="20"></div>
            <div class="form-group"><label>📝 Bio</label><input type="text" id="edit-bio" placeholder="Tell us about yourself" maxlength="100"></div>
            <div class="form-group"><label>🎨 Avatar Emoji</label><input type="text" id="edit-avatar" placeholder="🦍" maxlength="2" style="font-size:2em;text-align:center;"></div>
            <button class="save-btn" onclick="saveProfile()">💾 Save</button>
            <button class="cancel-btn" onclick="closeEditModal()">Cancel</button>
            <div id="modal-status" style="text-align:center;margin-top:10px;font-size:13px;"></div>
        </div>
    </div>
    <footer>&copy; 2026 RealGorillaOS | <a href="extensions.html" style="color:#555;">Back to Store</a></footer>

    <script>
      const firebaseConfig = {
        apiKey: "AIzaSyAWOpJLYgdKAMGeSe2mPikKVVF_45AZCvA",
        authDomain: "realgorilla-extensions.firebaseapp.com",
        projectId: "realgorilla-extensions",
        storageBucket: "realgorilla-extensions.firebasestorage.app",
        messagingSenderId: "653765688280",
        appId: "1:653765688280:web:b6ce5fbad78c3df28910ad"
      };
      firebase.initializeApp(firebaseConfig);
      const auth = firebase.auth();
      const db = firebase.firestore();

      function logout() { auth.signOut(); window.location.reload(); }
      function openEditModal() { document.getElementById('edit-modal').classList.add('show'); }
      function closeEditModal() { document.getElementById('edit-modal').classList.remove('show'); }

      async function loadMyExtensions() {
        const user = auth.currentUser;
        if (!user) return;
        try {
            const response = await fetch('https://extensions-worker.realgorilla.workers.dev/extensions');
            const allExtensions = await response.json();
            const myExtensions = allExtensions.filter(ext => ext.author === (user.displayName || user.email));
            document.getElementById('ext-count').textContent = myExtensions.length;
            let totalDownloads = 0;
            myExtensions.forEach(e => totalDownloads += (e.downloads || 0));
            document.getElementById('total-downloads').textContent = totalDownloads;
            const grid = document.getElementById('extensions-grid');
            const noExt = document.getElementById('no-extensions');
            if (myExtensions.length === 0) { grid.style.display = 'none'; noExt.style.display = 'block'; return; }
            grid.style.display = 'grid'; noExt.style.display = 'none';
            grid.innerHTML = myExtensions.map(ext => `
                <div class="ext-card" onclick="window.location.href='app.html?id=${ext.id}'">
                    <div class="thumbnail">${ext.icon || '🧩'}</div>
                    <div class="card-body">
                        <div class="card-icon">${ext.icon || '🧩'}</div>
                        <div class="card-info">
                            <h3>${ext.name}</h3>
                            <div class="meta">${ext.type} • ${(ext.downloads||0).toLocaleString()} downloads</div>
                        </div>
                    </div>
                </div>
            `).join('');
        } catch(e) {
            document.getElementById('extensions-grid').innerHTML = '<p class="loading">⚠️ Could not load extensions.</p>';
        }
      }

      function showTab(tab, el) {
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        el.classList.add('active');
        document.getElementById('extensions-tab').style.display = tab === 'extensions' ? 'block' : 'none';
        document.getElementById('about-tab').style.display = tab === 'about' ? 'block' : 'none';
      }

      auth.onAuthStateChanged(async user => {
        const urlParams = new URLSearchParams(window.location.search);
        const viewUser = urlParams.get('user');
        
        if (user || viewUser) {
          if (user) {
            document.getElementById('user-info').textContent = '👤 ' + (user.displayName || 'My Profile');
            document.getElementById('user-info').onclick = () => window.location.href = 'profile.html';
            document.getElementById('login-btn').style.display = 'none';
            document.getElementById('logout-btn').style.display = 'inline-block';
          }
          document.getElementById('login-warning').style.display = 'none';
          document.getElementById('profile-content').style.display = 'block';
          
          if (viewUser) {
            document.getElementById('display-username').textContent = '@' + viewUser;
            document.getElementById('display-email').textContent = '';
            document.getElementById('edit-btn').style.display = 'none';
            document.getElementById('avatar-display').textContent = '🧩';
            try {
              const r = await fetch('https://extensions-worker.realgorilla.workers.dev/extensions');
              const allExt = await r.json();
              const userExt = allExt.filter(ext => ext.author === viewUser);
              document.getElementById('ext-count').textContent = userExt.length;
              let dls = 0; userExt.forEach(e => dls += (e.downloads||0));
              document.getElementById('total-downloads').textContent = dls;
              document.getElementById('display-bio').textContent = userExt.length > 0 ? 'Extension developer' : 'No extensions yet.';
              const grid = document.getElementById('extensions-grid');
              const noExt = document.getElementById('no-extensions');
              if (userExt.length === 0) { grid.style.display = 'none'; noExt.style.display = 'block'; }
              else {
                grid.style.display = 'grid'; noExt.style.display = 'none';
                grid.innerHTML = userExt.map(ext => `
                  <div class="ext-card" onclick="window.location.href='app.html?id=${ext.id}'">
                    <div class="thumbnail">${ext.icon || '🧩'}</div>
                    <div class="card-body"><div class="card-icon">${ext.icon || '🧩'}</div><div class="card-info"><h3>${ext.name}</h3><div class="meta">${ext.type} • ${(ext.downloads||0).toLocaleString()} downloads</div></div></div>
                  </div>`).join('');
              }
            } catch(e) { document.getElementById('extensions-grid').innerHTML = '<p class="loading">⚠️ Could not load extensions.</p>'; }
            return;
          }
          
          document.getElementById('display-email').textContent = user.email;
          document.getElementById('edit-btn').style.display = 'inline-block';
          const doc = await db.collection('profiles').doc(user.uid).get();
          if (doc.exists) {
            const data = doc.data();
            document.getElementById('display-username').textContent = '@' + (data.username || 'username');
            document.getElementById('display-bio').textContent = data.bio || 'No bio yet.';
            document.getElementById('avatar-display').textContent = data.avatar || '🦍';
            document.getElementById('edit-username').value = data.username || '';
            document.getElementById('edit-bio').value = data.bio || '';
            document.getElementById('edit-avatar').value = data.avatar || '🦍';
          } else {
            document.getElementById('display-username').textContent = '@' + (user.displayName || 'username');
          }
          loadMyExtensions();
        } else {
          document.getElementById('login-warning').style.display = 'block';
          document.getElementById('profile-content').style.display = 'none';
        }
      });

      async function saveProfile() {
        const user = auth.currentUser;
        if (!user) return;
        const username = document.getElementById('edit-username').value.trim();
        if (!username) { document.getElementById('modal-status').textContent = '❌ Please enter a username.'; return; }
        try {
          await db.collection('profiles').doc(user.uid).set({
            username: username,
            bio: document.getElementById('edit-bio').value.trim(),
            avatar: document.getElementById('edit-avatar').value.trim() || '🦍',
            email: user.email,
            updatedAt: new Date().toISOString()
          });
          document.getElementById('display-username').textContent = '@' + username;
          document.getElementById('display-bio').textContent = document.getElementById('edit-bio').value.trim() || 'No bio yet.';
          document.getElementById('avatar-display').textContent = document.getElementById('edit-avatar').value.trim() || '🦍';
          document.getElementById('modal-status').textContent = '✅ Saved!';
          setTimeout(closeEditModal, 1000);
        } catch(e) { document.getElementById('modal-status').textContent = '❌ Error: ' + e.message; }
      }
    </script>
</body>
</html>
