<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Profile - RealGorilla</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: #0a0a0a;
            color: white;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        #login-bar { background:#111;padding:8px 20px;display:flex;justify-content:flex-end;align-items:center;gap:10px;font-size:13px;border-bottom:1px solid #222; }
        #login-bar span { color:#aaa; }
        #login-bar button { border:none;padding:6px 15px;border-radius:5px;cursor:pointer;font-weight:bold; }
        .nav-login-btn { background:#019999;color:#000; }
        .nav-logout-btn { background:#f44747;color:#fff; }
        .header {
            background: linear-gradient(180deg, #019999 0%, #0a0a0a 100%);
            padding: 40px 20px; text-align: center;
        }
        .header h1 { font-size: 2.5em; text-shadow: 3px 3px 0 #000; }
        .container { max-width: 650px; margin: 30px auto; padding: 20px; }
        .profile-card {
            background: #1a1a1a; border: 2px solid #019999;
            border-radius: 15px; padding: 30px; text-align: center; margin-bottom: 30px;
        }
        .avatar {
            font-size: 5em; margin-bottom: 15px;
            width: 100px; height: 100px; background: #0a0a0a;
            border-radius: 50%; display: flex; align-items: center;
            justify-content: center; margin: 0 auto 15px;
        }
        .form-group { margin-bottom: 20px; text-align: left; }
        label { display: block; margin-bottom: 5px; color: #019999; font-weight: bold; }
        input {
            width: 100%; padding: 12px; border-radius: 10px;
            border: 2px solid #333; background: #0a0a0a;
            color: white; font-family: 'Segoe UI', sans-serif; font-size: 14px;
        }
        input:focus { border-color: #019999; outline: none; }
        .save-btn {
            background: #019999; color: #000; padding: 12px 30px;
            border: none; border-radius: 25px; font-size: 1.1em;
            font-weight: bold; cursor: pointer; width: 100%; margin-top: 10px;
        }
        .save-btn:hover { background: #fff; }
        .back-link { color: #019999; text-decoration: none; display: inline-block; margin-top: 20px; }
        .back-link:hover { color: #fff; }
        #status { margin-top: 15px; padding: 10px; border-radius: 8px; display: none; text-align: center; }
        #status.success { background: #1a3a1a; border: 1px solid #019999; display: block; }
        #status.error { background: #3a1a1a; border: 1px solid #ff4444; display: block; }
        .login-warning {
            background: #3a1a1a; border: 1px solid #ff4444;
            padding: 15px; border-radius: 10px; text-align: center;
        }
        .login-warning a { color: #019999; font-weight: bold; }
        .extensions-section { margin-top: 20px; }
        .extensions-section h2 { color: #019999; margin-bottom: 15px; font-size: 1.3em; }
        .my-ext-card {
            background: #1a1a1a; border: 1px solid #333;
            border-radius: 10px; padding: 15px; margin-bottom: 10px;
            display: flex; justify-content: space-between; align-items: center;
        }
        .my-ext-card h3 { color: #019999; font-size: 1em; }
        .my-ext-card p { color: #aaa; font-size: 0.8em; }
        .badge { padding: 4px 10px; border-radius: 15px; font-size: 0.7em; font-weight: bold; display: inline-block; margin-left: 5px; }
        .badge-verified { background: #019999; color: #000; }
        .no-extensions { color: #666; text-align: center; padding: 20px; }
        .no-extensions a { color: #019999; }
        .loading-text { text-align: center; color: #666; padding: 20px; }
        footer { text-align: center; padding: 20px; color: #444; font-size: 0.8em; margin-top: auto; }
    </style>
    <!-- Firebase -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
</head>
<body>
    <div id="login-bar">
        <span id="user-info">Not logged in</span>
        <button id="login-btn" onclick="window.location.href='login.html'" class="nav-login-btn">🔐 Login</button>
        <button id="logout-btn" onclick="logout()" class="nav-logout-btn" style="display:none;">Logout</button>
    </div>

    <div class="header">
        <h1>👤 My Profile</h1>
        <p>Customize your RealGorilla account</p>
    </div>

    <div class="container">
        <div id="login-warning" class="login-warning">
            ⚠️ Please <a href="login.html">log in</a> to view your profile.
        </div>

        <div id="profile-content" style="display:none;">
            <div class="profile-card">
                <div class="avatar" id="avatar-display">🦍</div>
                <div class="form-group">
                    <label>🦍 Username</label>
                    <input type="text" id="username" placeholder="Choose a username" maxlength="20">
                    <small style="color:#888;">This is how others will see you in the store</small>
                </div>
                <div class="form-group">
                    <label>📧 Email</label>
                    <input type="email" id="email-display" readonly style="color:#666;">
                    <small style="color:#888;">Your email is private</small>
                </div>
                <div class="form-group">
                    <label>📝 Bio (optional)</label>
                    <input type="text" id="bio" placeholder="Tell us about yourself" maxlength="100">
                </div>
                <div class="form-group">
                    <label>🎨 Avatar Emoji</label>
                    <input type="text" id="avatar-emoji" placeholder="🦍" maxlength="2" style="font-size:2em;text-align:center;">
                </div>
                <button class="save-btn" onclick="saveProfile()">💾 Save Profile</button>
                <div id="status"></div>
            </div>

            <!-- My Extensions -->
            <div class="extensions-section">
                <h2>📦 My Extensions</h2>
                <div id="my-extensions"><div class="loading-text">Loading your extensions...</div></div>
            </div>
        </div>
        <a href="extensions.html" class="back-link">← Back to Extensions</a>
    </div>

    <footer>&copy; 2026 RealGorillaOS</footer>

    <script>
      const firebaseConfig = {
        apiKey: "AIzaSyAWOpJLYgdKAMGeSe2mPikKVVF_45AZCvA",
        authDomain: "realgorilla-extensions.firebaseapp.com",
        projectId: "realgorilla-extensions",
        storageBucket: "realgorilla-extensions.firebasestorage.app",
        messagingSenderId: "653765688280",
        appId: "1:653765688280:web:b6ce5fbad78c3df28910ad"
      };
      firebase.initializeApp(firebaseConfig);
      const auth = firebase.auth();
      const db = firebase.firestore();

      function logout() {
        auth.signOut();
        window.location.reload();
      }

      async function loadMyExtensions() {
        const user = auth.currentUser;
        if (!user) return;
        
        try {
            const response = await fetch('https://extensions-worker.realgorilla.workers.dev/extensions');
            const allExtensions = await response.json();
            const myExtensions = allExtensions.filter(ext => ext.author === (user.displayName || user.email));
            
            const container = document.getElementById('my-extensions');
            if (myExtensions.length === 0) {
                container.innerHTML = '<p class="no-extensions">📭 No extensions yet.<br><a href="submit.html">Submit your first extension!</a></p>';
                return;
            }
            
            container.innerHTML = myExtensions.map(ext => `
                <div class="my-ext-card">
                    <div>
                        <h3>${ext.icon || '🧩'} ${ext.name} <span class="badge badge-verified">✅ Verified</span></h3>
                        <p>${ext.description} | ${ext.type} | ${ext.downloads || 0} downloads</p>
                    </div>
                    <a href="app.html?id=${ext.id}" style="color:#019999;text-decoration:none;font-weight:bold;">View →</a>
                </div>
            `).join('');
        } catch(e) {
            document.getElementById('my-extensions').innerHTML = '<p class="no-extensions">⚠️ Could not load extensions.</p>';
        }
      }

      auth.onAuthStateChanged(async user => {
        if (user) {
          document.getElementById('user-info').textContent = '🦍 ' + (user.displayName || user.email);
          document.getElementById('login-btn').style.display = 'none';
          document.getElementById('logout-btn').style.display = 'inline-block';
          document.getElementById('login-warning').style.display = 'none';
          document.getElementById('profile-content').style.display = 'block';
          document.getElementById('email-display').value = user.email;
          
          const doc = await db.collection('profiles').doc(user.uid).get();
          if (doc.exists) {
            const data = doc.data();
            document.getElementById('username').value = data.username || '';
            document.getElementById('bio').value = data.bio || '';
            document.getElementById('avatar-emoji').value = data.avatar || '🦍';
            document.getElementById('avatar-display').textContent = data.avatar || '🦍';
          }
          
          document.getElementById('avatar-emoji').addEventListener('input', function() {
            document.getElementById('avatar-display').textContent = this.value || '🦍';
          });
          
          loadMyExtensions();
        } else {
          document.getElementById('login-warning').style.display = 'block';
          document.getElementById('profile-content').style.display = 'none';
        }
      });

      async function saveProfile() {
        const user = auth.currentUser;
        if (!user) return;
        
        const username = document.getElementById('username').value.trim();
        if (!username) { showStatus('Please choose a username.', 'error'); return; }
        
        const existing = await db.collection('profiles').where('username', '==', username).get();
        if (!existing.empty && existing.docs[0].id !== user.uid) {
          showStatus('Username already taken. Choose another.', 'error');
          return;
        }
        
        await db.collection('profiles').doc(user.uid).set({
          username: username,
          bio: document.getElementById('bio').value.trim(),
          avatar: document.getElementById('avatar-emoji').value.trim() || '🦍',
          email: user.email,
          updatedAt: new Date().toISOString()
        });
        showStatus('✅ Profile saved!', 'success');
      }

      function showStatus(msg, type) {
        const s = document.getElementById('status');
        s.textContent = msg; s.className = type;
        setTimeout(() => s.style.display = 'none', 3000);
      }
    </script>
</body>
</html>
