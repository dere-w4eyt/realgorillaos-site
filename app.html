<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Extension Details - RealGorilla Store</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: #0a0a0a;
            color: white;
            min-height: 100vh;
        }
        .back-bar {
            background: #111;
            padding: 15px 30px;
            border-bottom: 2px solid #019999;
        }
        .back-bar a { color: #019999; text-decoration: none; font-size: 1.1em; }
        .container { max-width: 800px; margin: 0 auto; padding: 30px 20px; }
        
        .app-header {
            display: flex; gap: 25px; align-items: center;
            margin-bottom: 30px; flex-wrap: wrap;
        }
        .app-icon {
            width: 120px; height: 120px;
            background: #1a1a1a;
            border-radius: 25px;
            display: flex; align-items: center; justify-content: center;
            font-size: 4em; flex-shrink: 0;
            overflow: hidden;
        }
        .app-icon img { width: 100%; height: 100%; object-fit: cover; }
        .app-info h1 { font-size: 2em; margin-bottom: 5px; }
        .app-info .developer { color: #666; margin-bottom: 10px; }
        .app-info .stars { color: #ffcc00; font-size: 1.2em; margin-bottom: 10px; }
        .app-info .meta { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 15px; }
        .badge {
            padding: 5px 12px; border-radius: 15px;
            font-size: 0.8em; font-weight: bold; display: inline-block;
        }
        .badge-verified { background: #019999; color: #000; }
        .badge-type { background: #333; color: #aaa; }
        
        .install-btn {
            background: #019999; color: #000; padding: 14px 35px;
            border-radius: 25px; text-decoration: none; font-weight: bold;
            font-size: 1.1em; display: inline-block; margin-bottom: 30px;
        }
        .install-btn:hover { background: #fff; }
        
        .section { margin-bottom: 30px; }
        .section h2 { color: #019999; margin-bottom: 15px; font-size: 1.4em; }
        .section p { color: #aaa; line-height: 1.6; }
        
        .review-card {
            background: #1a1a1a; border: 1px solid #222;
            border-radius: 15px; padding: 20px; margin-bottom: 15px;
        }
        .review-card .review-header {
            display: flex; justify-content: space-between;
            margin-bottom: 10px; flex-wrap: wrap; gap: 10px;
        }
        .review-card .reviewer { color: #019999; font-weight: bold; }
        .review-card .review-stars { color: #ffcc00; }
        .review-card .review-date { color: #666; font-size: 0.8em; }
        .review-card .review-text { color: #aaa; line-height: 1.5; }
        
        .review-form {
            background: #1a1a1a; border: 2px solid #019999;
            border-radius: 15px; padding: 25px; margin-top: 20px;
        }
        .review-form h3 { color: #019999; margin-bottom: 15px; }
        .review-form input, .review-form select, .review-form textarea {
            width: 100%; padding: 12px; margin-bottom: 15px;
            border-radius: 10px; border: 1px solid #333;
            background: #0a0a0a; color: white;
            font-family: 'Segoe UI', sans-serif; font-size: 14px;
        }
        .review-form textarea { min-height: 80px; resize: vertical; }
        .review-form button {
            background: #019999; color: #000; padding: 12px 30px;
            border: none; border-radius: 25px; font-weight: bold;
            cursor: pointer; font-size: 1em;
        }
        .review-form button:hover { background: #fff; }
        
        .loading { text-align: center; padding: 40px; color: #666; }
        .star-rating { display: flex; gap: 5px; font-size: 1.5em; cursor: pointer; }
        .star-rating span { color: #333; transition: color 0.2s; }
        .star-rating span.active, .star-rating span:hover { color: #ffcc00; }
        
        footer {
            text-align: center; padding: 30px; color: #444;
            font-size: 0.8em; border-top: 1px solid #111;
        }
    </style>
</head>
<body>
    <div class="back-bar">
        <a href="extensions.html">← Back to Store</a>
    </div>
    <div class="container" id="app-container">
        <div class="loading">🔄 Loading extension details...</div>
    </div>
    <footer>&copy; 2026 RealGorillaOS — All extensions verified with VirusTotal</footer>

    <script>
        const params = new URLSearchParams(window.location.search);
        const appId = params.get('id');
        
        async function loadApp() {
            try {
                const response = await fetch(`https://extensions-worker.realgorilla.workers.dev/extensions`);
                const extensions = await response.json();
                const app = extensions.find(e => e.id == appId);
                
                if (!app) {
                    document.getElementById('app-container').innerHTML = '<p style="color:#ff4444;text-align:center;">Extension not found.</p>';
                    return;
                }
                
                // Load reviews
                let reviewsHtml = '<div class="loading">Loading reviews...</div>';
                try {
                    const reviewsResponse = await fetch(`https://extensions-worker.realgorilla.workers.dev/reviews/${appId}`);
                    const reviews = await reviewsResponse.json();
                    if (reviews.length === 0) {
                        reviewsHtml = '<p style="color:#666;">No reviews yet. Be the first to review!</p>';
                    } else {
                        reviewsHtml = reviews.map(r => `
                            <div class="review-card">
                                <div class="review-header">
                                    <span class="reviewer">${r.user_name}</span>
                                    <span class="review-stars">${'★'.repeat(r.rating)}${'☆'.repeat(5-r.rating)}</span>
                                    <span class="review-date">${new Date(r.created_at).toLocaleDateString()}</span>
                                </div>
                                <p class="review-text">${r.comment || 'No comment.'}</p>
                            </div>
                        `).join('');
                    }
                } catch(e) { reviewsHtml = '<p style="color:#666;">Reviews unavailable.</p>'; }
                
                const icon = app.image_url ? `<img src="${app.image_url}" alt="${app.name}">` : (app.icon || '🧩');
                const rating = app.rating ? app.rating.toFixed(1) : '0.0';
                
                document.getElementById('app-container').innerHTML = `
                    <div class="app-header">
                        <div class="app-icon">${icon}</div>
                        <div class="app-info">
                            <h1>${app.name}</h1>
                            <div class="developer">by ${app.author} • v${app.version}</div>
                            <div class="stars">★★★★★ ${rating} • ${app.rating_count || 0} reviews • ${(app.downloads || 0).toLocaleString()} downloads</div>
                            <div class="meta">
                                <span class="badge badge-verified">✅ VirusTotal Verified</span>
                                <span class="badge badge-type">${app.type}</span>
                            </div>
                        </div>
                    </div>
                    
                    <a href="${app.url}" target="_blank" class="install-btn">⬇ Install Now</a>
                    
                    <div class="section">
                        <h2>📝 Description</h2>
                        <p>${app.description}</p>
                    </div>
                    
                    <div class="section">
                        <h2>⭐ Reviews</h2>
                        <div id="reviews-list">${reviewsHtml}</div>
                        
                        <div class="review-form">
                            <h3>Write a Review</h3>
                            <input type="text" id="review-name" placeholder="Your name">
                            <div class="star-rating" id="star-rating">
                                <span onclick="setRating(1)">☆</span>
                                <span onclick="setRating(2)">☆</span>
                                <span onclick="setRating(3)">☆</span>
                                <span onclick="setRating(4)">☆</span>
                                <span onclick="setRating(5)">☆</span>
                            </div>
                            <input type="hidden" id="review-rating" value="5">
                            <textarea id="review-comment" placeholder="What do you think of this extension?"></textarea>
                            <button onclick="submitReview()">Submit Review</button>
                            <p id="review-status" style="margin-top:10px;"></p>
                        </div>
                    </div>
                `;
            } catch(err) {
                document.getElementById('app-container').innerHTML = '<p style="color:#ff4444;text-align:center;">⚠️ Could not load extension.</p>';
            }
        }
        
        function setRating(rating) {
            document.getElementById('review-rating').value = rating;
            const stars = document.querySelectorAll('#star-rating span');
            stars.forEach((s, i) => {
                s.textContent = i < rating ? '★' : '☆';
                s.classList.toggle('active', i < rating);
            });
        }
        
        async function submitReview() {
            const name = document.getElementById('review-name').value || 'Anonymous';
            const rating = parseInt(document.getElementById('review-rating').value);
            const comment = document.getElementById('review-comment').value;
            const status = document.getElementById('review-status');
            
            try {
                const response = await fetch(`https://extensions-worker.realgorilla.workers.dev/review/${appId}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ user_name: name, rating: rating, comment: comment })
                });
                const result = await response.json();
                if (result.success) {
                    status.innerHTML = '<span style="color:#019999;">✅ Review submitted! Refreshing...</span>';
                    setTimeout(() => loadApp(), 1500);
                } else {
                    status.innerHTML = '<span style="color:#ff4444;">❌ Failed to submit review.</span>';
                }
            } catch(e) {
                status.innerHTML = '<span style="color:#ff4444;">❌ Error submitting review.</span>';
            }
        }
        
        loadApp();
    </script>
</body>
</html>
