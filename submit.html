<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Submit Extension - RealGorilla</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', 'Impact', sans-serif;
            background: #0a0a0a;
            color: white;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        .header {
            background: linear-gradient(180deg, #019999 0%, #0a0a0a 100%);
            padding: 40px 20px;
            text-align: center;
        }
        .header h1 { font-size: 2.5em; text-shadow: 3px 3px 0 #000; }
        .container { max-width: 600px; margin: 30px auto; padding: 20px; }
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 5px; color: #019999; font-weight: bold; }
        input, textarea, select {
            width: 100%; padding: 12px; border-radius: 10px;
            border: 2px solid #333; background: #1a1a1a;
            color: white; font-family: 'Segoe UI', sans-serif; font-size: 14px;
        }
        input:focus, textarea:focus { border-color: #019999; outline: none; }
        textarea { min-height: 80px; resize: vertical; }
        .submit-btn {
            background: #019999; color: #000; padding: 14px 30px;
            border: none; border-radius: 25px; font-size: 1.1em;
            font-weight: bold; cursor: pointer; width: 100%;
        }
        .submit-btn:hover { background: #fff; }
        #status {
            margin-top: 20px; padding: 15px; border-radius: 10px;
            display: none; text-align: center;
        }
        #status.success { background: #1a3a1a; border: 1px solid #019999; display: block; }
        #status.error { background: #3a1a1a; border: 1px solid #ff4444; display: block; }
        #status.scanning { background: #1a1a3a; border: 1px solid #019999; display: block; }
        .back-link { color: #019999; text-decoration: none; display: inline-block; margin-top: 20px; }
        .back-link:hover { color: #fff; }
        footer { text-align: center; padding: 20px; color: #444; font-size: 0.8em; margin-top: auto; }
    </style>
</head>
<body>
    <div class="header">
        <h1>🧩 Submit an Extension</h1>
        <p>Share your extension with the RealGorilla community</p>
    </div>

    <div class="container">
        <form id="submit-form">
            <div class="form-group">
                <label>🧩 Extension Name</label>
                <input type="text" id="ext-name" placeholder="My Cool Extension" required>
            </div>
            <div class="form-group">
                <label>👤 Developer Name</label>
                <input type="text" id="ext-author" placeholder="Your name" required>
            </div>
            <div class="form-group">
                <label>📝 Description</label>
                <textarea id="ext-desc" placeholder="What does your extension do?" required></textarea>
            </div>
            <div class="form-group">
                <label>🔗 Extension URL (GitHub or direct download)</label>
                <input type="url" id="ext-url" placeholder="https://github.com/you/extension" required>
            </div>
            <div class="form-group">
                <label>🖼️ Extension Icon URL (optional)</label>
                <input type="url" id="ext-image" placeholder="https://example.com/icon.png">
            </div>
            <div class="form-group">
                <label>📧 Your Email (for verification)</label>
                <input type="email" id="ext-email" placeholder="you@example.com" required>
            </div>
            <button type="submit" class="submit-btn">🚀 Submit for Review</button>
        </form>

        <div id="status"></div>
        <a href="extensions.html" class="back-link">← Back to Extensions</a>
    </div>

    <footer>&copy; 2026 RealGorillaOS — Extensions verified with VirusTotal</footer>

    <script>
        document.getElementById('submit-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const status = document.getElementById('status');
            status.className = 'scanning';
            status.innerHTML = '🔍 Submitting extension for security scan...';
            
            const data = {
                name: document.getElementById('ext-name').value,
                author: document.getElementById('ext-author').value,
                description: document.getElementById('ext-desc').value,
                url: document.getElementById('ext-url').value,
                image_url: document.getElementById('ext-image').value,
                email: document.getElementById('ext-email').value
            };
            
            try {
                const response = await fetch('https://extensions-worker.realgorilla.workers.dev/submit', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });
                const result = await response.json();
                
                if (result.status === 'approved') {
                    status.className = 'success';
                    status.innerHTML = `✅ Extension "${data.name}" passed security scan! It will appear on the extensions page shortly.`;
                } else if (result.status === 'scanning') {
                    status.className = 'scanning';
                    status.innerHTML = '🔍 Your extension is being scanned. Check back in a few minutes.';
                } else {
                    status.className = 'error';
                    status.innerHTML = `❌ Security scan detected issues: ${result.message || 'Please check your extension and try again.'}`;
                }
            } catch (err) {
                status.className = 'error';
                status.innerHTML = '❌ Unable to connect to scanning service. Please try again later.';
            }
        });
    </script>
</body>
</html>
